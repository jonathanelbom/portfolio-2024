name: Deploy to DreamHost

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DREAMHOST_HOST }} >> ~/.ssh/known_hosts
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          DEST="${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:${{ secrets.DREAMHOST_PATH }}"
          rsync -avz -e "$SSH" dist/index.html $DEST
          rsync -avz --delete -e "$SSH" dist/assets/ ${DEST}assets/
